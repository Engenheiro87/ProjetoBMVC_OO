<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - {{name}}</title>
    <link rel="icon" type="image/png" href="../../../static/img/unifit_icon.png">

    <link rel="stylesheet" href="../../../static/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../../static/css/font-awesome.min.css">
    <link rel="stylesheet" href="../../../static/css/aos.css">
    
    <!-- MAIN CSS -->
    <link rel="stylesheet" href="../../../static/css/tooplate-gymso-style.css">
</head>
<body style="margin-top: 80px;">
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <img src="../../../static/img/unifit_icon.png" width="45px">
            <a class="navbar-brand" href="">UniFit</a>

            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ml-lg-auto">
                    <li class="nav-item">
                        <a href="#home" class="nav-link smoothScroll">Home</a>
                    </li>

                    <li class="nav-item">
                        <a href="#about" class="nav-link smoothScroll">About Us</a>
                    </li>

                    <li class="nav-item">
                        <a href="#contact" class="nav-link smoothScroll">Contact</a>
                    </li>
                </ul>

                <ul class="social-icon ml-lg-3">
                    <li><a href="https://fb.com/tooplate" class="fa fa-facebook"></a></li>
                    <li><a href="#" class="fa fa-twitter"></a></li>
                    <li><a href="#" class="fa fa-instagram"></a></li>
                </ul>
            </div>
        </div>
    </nav>
    <h3>Welcome, {{nick}}.</h3><br>

    <!-- MAIN PROFILE CONTAINER -->
    <div class="main-profile-container">
        <!-- OPTIONS SECTION -->
        <div class="profile-options" style="width: 15%">
            <a href="/logout" style="color: orange;" ><u>Log out.</u></a>
        </div>

        <!-- WORKOUTS SECTION -->
        <div style="padding-left: 50px; width: 70%;">
            <h4 style="color:dimgray;"><strong>Your workouts:</strong></h4>
            <div class="profile-card-container">

                <!-- THE WORKOUTS -->
                <a href="#"><div class="profile-card" style="background: linear-gradient(white, green);">
                    <h1 class="profile-card-title" style="border-bottom: 2px solid green; color:aliceblue">Workout A</h1>
                    <br>
                    <ul class="profile-card-workout-list">
                        <li class="profile-card-list-item">Workout 2</li>
                        <li class="profile-card-list-item">Workout 3</li>
                        <li class="profile-card-list-item">Workout 4</li>
                    </ul>            
                </div>
                </a>

                <div class="profile-card" style="background: linear-gradient(white, orange);">
                    <h1 class="profile-card-title" style="border-bottom: 2px solid orange; color:aliceblue">Workout B</h1>
                    <br>
                    <ul class="profile-card-workout-list">
                        <li class="profile-card-list-item">Workout 2</li>
                        <li class="profile-card-list-item">Workout 3</li>
                        <li class="profile-card-list-item">Workout 4</li>
                    </ul>            
                </div>

                <div class="profile-card" style="background: linear-gradient(white, blue);">
                    <h1 class="profile-card-title" style="border-bottom: 2px solid blue; color:aliceblue">Workout C</h1>
                    <br>
                    <ul class="profile-card-workout-list">
                        <li class="profile-card-list-item">Workout 2</li>
                        <li class="profile-card-list-item">Workout 3</li>
                        <li class="profile-card-list-item">Workout 4</li>
                    </ul>            
                </div>
            </div>
        </div>
        </div>
    </body>
</html>
